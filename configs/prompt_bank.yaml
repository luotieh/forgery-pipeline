# prompt bank v1（PATCH 9.2a）
# 中文说明：本文件是喂给生成器（img2img/inpaint/object/background 四类算子）的英文
# prompt 模板库。prompt_bank_version = 本文件内容的 sha1 前 12 位（见
# forgery_pipeline.prompts.bank_version）；只要修改本文件（哪怕一个字节），版本哈希
# 就会变化，且该哈希会逐行记入 manifest 的 op_params，用于保证实验可复现——任何一次
# 生成用的是哪个版本的模板库，都可从数据行本身回溯，不依赖外部记忆。
# 四节缺一不可、且每节内至少一条模板；具体选取哪一条由
# forgery_pipeline.prompts.pick_prompt(bank, kind, key) 按 key 的 stable_hash 确定性决定。

